name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK (Unsigned)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Rename APK for Release
        run: |
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/reachout-release.apk

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "ReachOut MVP Release v1.0.0"
          body: |
            ### ReachOut Android WebView Wrapper App
            
            This release contains the compiled APK of the ReachOut church outreach platform.
            
            * **Local Simulation Sandbox:** Included (no internet required for offline tests).
            * **API permissions enabled:** Internet permissions active to sync Google Sheets and WhatsApp Cloud APIs.
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/reachout-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
