name: Build and Release Task Flow Lite APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias taskflowlite \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android/app/taskflowlite-release.keystore \
            -storepass taskflowlite \
            -keypass taskflowlite \
            -dname "CN=Task Flow Lite, OU=GO Team, O=ReachOut, L=Lagos, S=Lagos, C=NG"

      - name: Grant execute permission for Gradle
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Copy APK to project root
        run: cp android/app/build/outputs/apk/release/app-release.apk GOTeam.apk

      - name: Test APK metadata
        run: |
          $ANDROID_HOME/build-tools/34.0.0/aapt dump badging GOTeam.apk | tee apk-metadata.txt
          grep "package: name='com.taskflowlite.app'" apk-metadata.txt
          grep "application-label:'Task Flow Lite'" apk-metadata.txt

      - name: Verify APK signing
        run: $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose --print-certs GOTeam.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: task-flow-lite-v1.0.0
          name: Task Flow Lite v1.0.0
          body: |
            Compact offline Android WebView APK for Task Flow Lite.

            - Package: com.taskflowlite.app
            - App name: Task Flow Lite
            - WebView entry: file:///android_asset/www/index.html
            - JavaScript and localStorage enabled
          files: GOTeam.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
